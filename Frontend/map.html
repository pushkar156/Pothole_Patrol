<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Live Network Map | PotholePatrol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js" defer></script>
    <style>
        .marker {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        .marker-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid white;
        }
        .marker-label {
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(15, 25, 48, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid var(--outline-variant);
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
        }
    </style>
</head>
<body style="overflow: hidden; height: 100vh;">
    <header class="app-bar">
        <a href="index.html" class="app-logo">
            <span class="material-symbols-outlined">analytics</span>
            <h1>PotholePatrol</h1>
        </a>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div style="text-align: right; margin-right: 8px;">
                <p class="label-sm" style="color: var(--primary); opacity: 0.7;">Region</p>
                <p style="font-size: 12px; font-weight: 600;">Pune Municipal Corp.</p>
            </div>
            <span class="material-symbols-outlined" style="color: var(--primary);">search</span>
        </div>
    </header>

    <main style="position: relative; height: calc(100vh - 64px); margin-top: 64px; background: var(--surface-container-lowest);">
        <!-- Background Map -->
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYM-Pt0_sPXsS25M992WNITPqQX_tVLTDhDGAvYWT4AkuV8l5bSlj-iEa-XQ8LtbxN5hn2Pxz0xaFGixfsTnIp08jaVsRko3UTcEMNU3rLl7hBVw9QdQvMxWVW6zH0Q-4LvCVkERNEiiv9LrJhHP5UX58sLYIAWiyqq2FOYzKyd5iwOBH2jSiQqbjHpIlmJUxUsXrebM0NEUo_NT-vhOc6kqdQC7wQRQzn4y8tQlgtDDddmCinaRDdSlIaFuXC11bfnpt2a5LG9Ukx" 
             style="width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1) invert(1);">

        <!-- Live Stream Badge -->
        <div style="position: absolute; top: 24px; left: 24px; z-index: 20;">
            <div class="status-chip" style="background: rgba(6,14,32,0.9); backdrop-filter: blur(12px); border: 1px solid var(--outline-variant); padding: 8px 16px;">
                <span class="animate-pulse" style="width: 8px; height: 8px; background: var(--error); border-radius: 50%; margin-right: 8px;"></span>
                LIVE STREAM
                <span style="border-left: 1px solid var(--outline); margin-left: 12px; padding-left: 12px; opacity: 0.5;">UTC+5:30</span>
            </div>
        </div>

        <!-- Hotspots -->
        <div class="marker" style="top: 40%; left: 30%;">
            <div class="marker-dot shadow-error" style="background: var(--error); box-shadow: 0 0 20px var(--error);"></div>
            <div class="marker-label">KOTHRUD</div>
        </div>

        <div class="marker" style="top: 35%; left: 55%;">
            <div class="marker-dot shadow-tertiary" style="background: var(--tertiary); box-shadow: 0 0 20px var(--tertiary);"></div>
            <div class="marker-label">FC ROAD</div>
        </div>

        <!-- Severity Legend -->
        <div style="position: absolute; bottom: 100px; left: 24px; z-index: 20; max-width: 250px; width: calc(100% - 48px);">
            <div class="card-high shadow-xl" style="padding: 20px; border: 1px solid var(--outline-variant);">
                <h3 class="label-sm" style="color: var(--on-surface-variant); margin-bottom: 16px;">Severity Legend</h3>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--error);"></div>
                            <span style="font-size: 14px;">Critical</span>
                        </div>
                        <span class="label-sm" style="opacity: 0.5;">SEV 5</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--tertiary);"></div>
                            <span style="font-size: 14px;">Moderate</span>
                        </div>
                        <span class="label-sm" style="opacity: 0.5;">SEV 4</span>
                    </div>
                </div>
                <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--outline-variant); display: flex; justify-content: space-between;">
                    <span class="label-sm" style="color: var(--primary);">ACTIVE ANOMALIES</span>
                    <span style="font-weight: 800; color: var(--primary);">1,248</span>
                </div>
            </div>
        </div>

        <!-- Locate Me Button -->
        <button class="btn-primary" style="position: absolute; bottom: 100px; right: 24px; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; box-shadow: 0 8px 30px rgba(73,244,200,0.4);">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
        </button>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="material-symbols-outlined">map</span>
            Map
        </a>
        <a href="queue.html" class="nav-item">
            <span class="material-symbols-outlined">list_alt</span>
            Queue
        </a>
        <a href="settings.html" class="nav-item">
            <span class="material-symbols-outlined">settings</span>
            Settings
        </a>
    </nav>
</body>
</html>
